<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS社区物资管理系统 - 演示</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1677ff 0%, #0958d9 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }
        .content {
            max-width: 600px;
        }
        h1 { font-size: 2.5em; margin-bottom: 20px; }
        .card {
            background: rgba(255,255,255,0.9);
            color: #333;
            padding: 30px;
            border-radius: 12px;
            margin: 20px 0;
        }
        .btn {
            display: inline-block;
            background: #1677ff;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>🏥 社区物资管理系统</h1>
            <p>基于 Ant Design 优化设计的现代化界面演示</p>
            
            <div class="card">
                <h2>🎨 优化成果展示</h2>
                <ul style="text-align: left;">
                    <li>✅ Ant Design 6.0 配色系统</li>
                    <li>✅ 响应式卡片布局</li>
                    <li>✅ 统一的间距系统</li>
                    <li>✅ 扁平化按钮设计</li>
                    <li>✅ 完整的导航体验</li>
                </ul>
            </div>
            
            <div class="card">
                <h2>📱 功能模块</h2>
                <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                    <div style="flex: 1; min-width: 45%; background: #f0f9ff; padding: 10px; border-radius: 6px;">
                        日常物资巡检维护
                    </div>
                    <div style="flex: 1; min-width: 45%; background: #f0f9ff; padding: 10px; border-radius: 6px;">
                        就近互助调度
                    </div>
                </div>
            </div>
            
            <p><strong>本地演示请访问：</strong></p>
            <p><a href="quick-demo.html" class="btn">查看演示文档</a></p>
            <p><em>完整的React应用需要在本地运行 npm start</em></p>
        </div>
    </div>
</body>
</html>
