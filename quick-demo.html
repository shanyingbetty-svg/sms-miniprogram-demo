<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS社区物资管理系统 - 优化演示</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .header {
            background: linear-gradient(135deg, #1677ff 0%, #0958d9 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .demo-section {
            border-left: 4px solid #1677ff;
            padding-left: 15px;
            margin-bottom: 25px;
        }
        h1 {margin: 0 0 10px 0;}
        h2 {color: #1677ff; margin-top: 0;}
    </style>
</head>
<body>
    <div class="header">
        <h1>🏥 社区物资管理系统 - 界面优化演示</h1>
        <p>基于 Ant Design 系统重新设计的现代化界面</p>
    </div>

    <div class="card">
        <h2>🎨 优化亮点</h2>
        <div class="demo-section">
            <strong>配色系统</strong><br>
            采用 Ant Design 6.0 标准色彩系统<br>
            蓝：#1677ff | 绿：#52c41a | 黄：#faad14 | 红：#ff4d4f
        </div>
        <div class="demo-section">
            <strong>布局结构</strong><br>
            响应式容器布局 | 8px间距系统 | 层次分明的视觉设计
        </div>
        <div class="demo-section">
            <strong>导航优化</strong><br>
            每个页面都有返回首页按钮 | 一致的交互体验
        </div>
    </div>

    <div class="card">
        <h2>📱 功能模块</h2>
        <ul>
            <li>✅ 日常物资巡检维护</li>
            <li>🔄 应急物资消耗登记</li>
            <li>🤝 就近互助调度</li>
            <li>📊 账单结算查看</li>
        </ul>
    </div>

    <div class="card">
        <h2>🔗 访问链接</h2>
        <a href="https://shanyingbetty-svg.github.io/sms-miniprogram-demo" target="_blank">
            在线演示 (GitHub Pages)
        </a>
    </div>
</body>
</html>
